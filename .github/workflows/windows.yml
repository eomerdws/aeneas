name: PyInstaller Windows one dir release

on:
  workflow_dispatch:

jobs:
  pyinstaller-build:
    runs-on: windows-self-hosted
    steps:
      - name: Checkout app-builders-pyinstaller
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          echo "Install dependencies"
          python -m venv .venv 
          .venv\Scripts\activate 
          pip install -r requirements.txt 
          echo "Build Aeneas C extensions... "
          python setup.py build_ext --inplace

          echo "Create PyInstaller one directory executable"
          pyinstaller pyinstaller-onedir.spec --clean

      #- name: Tar build # It appears that windows has a tar command
      # run: |
      #   cd dist
      #   tar -cvf aeneas-cli.win.tar aeneas-cli

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeneas-cli.win.zip
          path: dist/aeneas-cli/

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: "aeneas-cli.win.zip"
